<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tara Adore — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --g1:#C9A84C;--g2:#E8C97A;--g3:#8a6e2f;
    --bg:#050505;--border:rgba(201,168,76,0.15);
    --text:#f0ece4;--muted:#9e9a93;--dim:#4e4a43;
    --card:rgba(15,15,15,0.85);--shadow:rgba(0,0,0,0.6);
    --input-bg:#0d0d0d;--input-border:rgba(201,168,76,0.12);
}
[data-theme="light"]{
    --bg:#f5f0e8;--border:rgba(139,110,47,0.2);
    --text:#1a1410;--muted:#6b6058;--dim:#a89880;
    --card:rgba(245,240,232,0.92);--shadow:rgba(100,70,20,0.15);
    --input-bg:#ede8df;--input-border:rgba(139,110,47,0.18);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .4s,color .4s;overflow:hidden}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 12s ease-in-out infinite alternate}
.orb1{width:350px;height:350px;background:radial-gradient(circle,rgba(201,168,76,0.07),transparent 70%);top:-80px;right:-60px}
.orb2{width:250px;height:250px;background:radial-gradient(circle,rgba(201,168,76,0.05),transparent 70%);bottom:-60px;left:-40px;animation-delay:-6s}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(20px,15px)}}

.theme-toggle{position:fixed;top:24px;right:24px;z-index:100;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:6px;display:flex;align-items:center;gap:4px;backdrop-filter:blur(20px);cursor:pointer}
.toggle-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:all .3s;background:transparent;color:var(--muted);font-size:.85rem}
.toggle-btn.active{background:linear-gradient(135deg,var(--g2),var(--g1));color:#000}
.toggle-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:0 8px;white-space:nowrap}

.wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:0 20px;animation:riseIn .6s cubic-bezier(.16,1,.3,1) both}
@keyframes riseIn{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 40px;backdrop-filter:blur(40px);box-shadow:0 32px 80px var(--shadow);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.35),transparent)}

.back-link{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;color:var(--muted);text-decoration:none;letter-spacing:.05em;margin-bottom:28px;transition:color .2s}
.back-link:hover{color:var(--g2)}

.logo{text-align:center;margin-bottom:28px}
.icon-wrap{width:52px;height:52px;border-radius:14px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
.icon-wrap i{font-size:1.3rem;background:linear-gradient(135deg,var(--g2),var(--g1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--text)}
.logo p{font-size:.72rem;color:var(--muted);margin-top:6px}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.input-wrap{position:relative}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:.8rem;pointer-events:none}
.form-control{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;padding:12px 14px 12px 40px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:all .25s}
.form-control::placeholder{color:var(--dim)}
.form-control:focus{border-color:var(--g1);box-shadow:0 0 0 3px rgba(201,168,76,0.1)}
.form-group:focus-within label{color:var(--g2)}
.pass-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:.8rem;transition:color .2s;padding:4px}
.pass-toggle:hover{color:var(--g1)}

.strength-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.05);margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}

.error-msg{background:rgba(224,92,92,0.08);border:1px solid rgba(224,92,92,0.2);border-radius:8px;padding:10px 14px;font-size:.75rem;color:#e05c5c;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.success-msg{background:rgba(78,203,141,0.08);border:1px solid rgba(78,203,141,0.2);border-radius:8px;padding:10px 14px;font-size:.75rem;color:#4ecb8d;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.success-msg a{color:#4ecb8d;font-weight:500}

.btn-reset{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--g2),var(--g1),#b8912a);color:#0a0800;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .3s;margin-top:4px}
.btn-reset:hover{box-shadow:0 10px 36px rgba(201,168,76,0.4);transform:translateY(-1px)}

.footer{text-align:center;margin-top:24px;font-size:.58rem;letter-spacing:.12em;color:var(--dim);text-transform:uppercase}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>

<div class="theme-toggle" onclick="toggleTheme()">
    <button class="toggle-btn" id="btnDark"><i class="fas fa-moon"></i></button>
    <span class="toggle-label" id="toggleLabel">Dark</span>
    <button class="toggle-btn" id="btnLight"><i class="fas fa-sun"></i></button>
</div>

<div class="wrap">
    <div class="card">
        <a href="/login" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>

        <div class="logo">
            <div class="icon-wrap"><i class="fas fa-shield-alt"></i></div>
            <h2>Set New Password</h2>
            <p>Choose a strong password for your account</p>
        </div>

        {% if error %}
        <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}
            {% if not token %}&nbsp;<a href="/forgot-password" style="color:#e05c5c;font-weight:500">Request new link →</a>{% endif %}
        </div>
        {% endif %}

        {% if success %}
        <div class="success-msg"><i class="fas fa-check-circle"></i> {{ success }}
            &nbsp;<a href="/login">Login now →</a>
        </div>
        {% endif %}

        {% if token %}
        <form method="POST" action="/reset-password/{{ token }}">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="new_password" id="passInput" class="form-control"
                           placeholder="Min 6 characters" oninput="checkStrength(this.value)" required>
                    <button type="button" class="pass-toggle" onclick="togglePass()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" class="btn-reset">
                <i class="fas fa-check" style="margin-right:8px"></i>Set New Password
            </button>
        </form>
        {% endif %}

        <div class="footer">Tara Adore © 2025 &nbsp;·&nbsp; taraadore.in</div>
    </div>
</div>

<script>
const html=document.documentElement;
const btnDark=document.getElementById('btnDark'),btnLight=document.getElementById('btnLight'),label=document.getElementById('toggleLabel');
let theme=localStorage.getItem('ta_theme')||'dark';applyTheme(theme);
function applyTheme(t){theme=t;html.setAttribute('data-theme',t);localStorage.setItem('ta_theme',t);
    if(t==='dark'){btnDark.classList.add('active');btnLight.classList.remove('active');label.textContent='Dark'}
    else{btnLight.classList.add('active');btnDark.classList.remove('active');label.textContent='Light'}}
function toggleTheme(){applyTheme(theme==='dark'?'light':'dark')}
function togglePass(){const i=document.getElementById('passInput'),ic=document.getElementById('eyeIcon');
    if(i.type==='password'){i.type='text';ic.className='fas fa-eye-slash'}else{i.type='password';ic.className='fas fa-eye'}}
function checkStrength(val){const f=document.getElementById('strengthFill');let s=0;
    if(val.length>=6)s++;if(/[A-Z]/.test(val))s++;if(/[0-9]/.test(val))s++;if(/[^A-Za-z0-9]/.test(val))s++;
    f.style.width=s>0?['25%','50%','75%','100%'][s-1]:'0';
    f.style.background=s>0?['#e05c5c','#e09a5c','#e0d45c','#4ecb8d'][s-1]:''}
</script>
</body>
</html>
