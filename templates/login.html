<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tara Adore — Admin Access</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

:root{
    --g1:#C9A84C;--g2:#E8C97A;--g3:#8a6e2f;
    --bg:#050505;--bg2:#0d0d0d;--bg3:#141414;
    --border:rgba(201,168,76,0.15);
    --text:#f0ece4;--muted:#9e9a93;--dim:#4e4a43;
    --card:rgba(15,15,15,0.85);
    --shadow:rgba(0,0,0,0.6);
    --input-bg:#0d0d0d;
    --input-border:rgba(201,168,76,0.12);
}

[data-theme="light"]{
    --bg:#f5f0e8;--bg2:#ede8df;--bg3:#e4ddd2;
    --border:rgba(139,110,47,0.2);
    --text:#1a1410;--muted:#6b6058;--dim:#a89880;
    --card:rgba(245,240,232,0.92);
    --shadow:rgba(100,70,20,0.15);
    --input-bg:#ede8df;
    --input-border:rgba(139,110,47,0.18);
}

body{
    font-family:'DM Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    transition:background .4s,color .4s;
    overflow:hidden;
    position:relative;
}

/* ── ANIMATED BACKGROUND ── */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{
    position:absolute;border-radius:50%;filter:blur(80px);
    animation:drift 12s ease-in-out infinite alternate;
}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(201,168,76,0.08),transparent 70%);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(201,168,76,0.06),transparent 70%);bottom:-80px;right:-80px;animation-delay:-5s}
.orb3{width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,76,0.05),transparent 70%);top:50%;left:50%;animation-delay:-3s}

[data-theme="light"] .orb1{background:radial-gradient(circle,rgba(201,168,76,0.15),transparent 70%)}
[data-theme="light"] .orb2{background:radial-gradient(circle,rgba(139,110,47,0.12),transparent 70%)}
[data-theme="light"] .orb3{background:radial-gradient(circle,rgba(201,168,76,0.1),transparent 70%)}

@keyframes drift{
    from{transform:translate(0,0) scale(1)}
    to{transform:translate(30px,20px) scale(1.08)}
}

/* ── GOLD LIGHT TOGGLE ── */
.theme-toggle{
    position:fixed;top:24px;right:24px;z-index:100;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:50px;
    padding:6px;
    display:flex;align-items:center;gap:4px;
    backdrop-filter:blur(20px);
    box-shadow:0 8px 32px var(--shadow);
    cursor:pointer;
}
.toggle-btn{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    border:none;cursor:pointer;
    transition:all .3s ease;
    background:transparent;
    color:var(--muted);font-size:.85rem;
}
.toggle-btn.active{
    background:linear-gradient(135deg,var(--g2),var(--g1));
    color:#000;
    box-shadow:0 4px 16px rgba(201,168,76,0.4);
}
.toggle-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:0 8px;white-space:nowrap}

/* ── GOLD LIGHT EFFECT (dark mode) ── */
.gold-light{
    position:fixed;top:0;left:50%;transform:translateX(-50%);
    width:600px;height:300px;
    background:radial-gradient(ellipse at top,rgba(201,168,76,0.12) 0%,transparent 70%);
    pointer-events:none;z-index:0;
    transition:opacity .5s ease;
    opacity:0;
}
.gold-light.on{opacity:1}
[data-theme="light"] .gold-light{display:none}

/* ── CARD ── */
.login-wrap{
    position:relative;z-index:10;
    width:100%;max-width:440px;
    padding:0 20px;
    animation:riseIn .6s cubic-bezier(.16,1,.3,1) both;
}

@keyframes riseIn{
    from{opacity:0;transform:translateY(32px)}
    to{opacity:1;transform:translateY(0)}
}

.login-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:44px 40px;
    backdrop-filter:blur(40px);
    box-shadow:0 32px 80px var(--shadow),0 0 0 1px rgba(255,255,255,0.03);
    position:relative;overflow:hidden;
}

.login-card::before{
    content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(201,168,76,0.35),transparent);
}
.login-card::after{
    content:'';position:absolute;bottom:0;left:0;right:0;
    height:120px;
    background:radial-gradient(ellipse at bottom,rgba(201,168,76,0.04),transparent 70%);
    pointer-events:none;
}

/* ── LOGO ── */
.login-logo{text-align:center;margin-bottom:36px}
.logo-gem{
    width:52px;height:52px;border-radius:14px;
    background:linear-gradient(135deg,#1a1410,#0d0d0d);
    border:1px solid rgba(201,168,76,0.2);
    display:inline-flex;align-items:center;justify-content:center;
    margin-bottom:16px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(201,168,76,0.1);
}
[data-theme="light"] .logo-gem{
    background:linear-gradient(135deg,#e4ddd2,#ede8df);
    box-shadow:0 8px 24px rgba(100,70,20,0.1),inset 0 1px 0 rgba(201,168,76,0.2);
}
.logo-gem i{font-size:1.3rem;background:linear-gradient(135deg,var(--g2),var(--g1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.login-logo h1{
    font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;
    background:linear-gradient(135deg,var(--g2) 20%,var(--g1) 60%,var(--g3));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    letter-spacing:.06em;line-height:1;
}
.login-logo p{font-size:.6rem;letter-spacing:.28em;color:var(--muted);margin-top:8px;text-transform:uppercase}

.divider{
    display:flex;align-items:center;gap:12px;margin:20px 0 28px;
}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider span{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}

/* ── FORM ── */
.form-group{margin-bottom:18px;position:relative}
.form-group label{
    display:block;font-size:.62rem;letter-spacing:.15em;
    text-transform:uppercase;color:var(--muted);margin-bottom:8px;
    transition:color .2s;
}
.input-wrap{position:relative}
.input-icon{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    color:var(--dim);font-size:.8rem;transition:color .2s;
    pointer-events:none;
}
.form-control{
    width:100%;background:var(--input-bg);
    border:1px solid var(--input-border);
    border-radius:10px;padding:13px 14px 13px 40px;
    color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;
    outline:none;transition:all .25s ease;
}
.form-control::placeholder{color:var(--dim)}
.form-control:focus{
    border-color:var(--g1);
    box-shadow:0 0 0 3px rgba(201,168,76,0.1);
}
.form-control:focus ~ .input-icon,
.input-wrap:focus-within .input-icon{color:var(--g1)}
.form-group:focus-within label{color:var(--g2)}

.pass-toggle{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--dim);cursor:pointer;
    font-size:.8rem;transition:color .2s;padding:4px;
}
.pass-toggle:hover{color:var(--g1)}

/* ── ERROR ── */
.error-msg{
    background:rgba(224,92,92,0.08);border:1px solid rgba(224,92,92,0.2);
    border-radius:8px;padding:10px 14px;
    font-size:.75rem;color:#e05c5c;margin-bottom:18px;
    display:flex;align-items:center;gap:8px;
    animation:shake .4s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── SUBMIT ── */
.btn-login{
    width:100%;padding:14px;border-radius:10px;border:none;
    background:linear-gradient(135deg,var(--g2),var(--g1),#b8912a);
    color:#0a0800;font-family:'DM Sans',sans-serif;
    font-size:.82rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
    cursor:pointer;transition:all .3s ease;
    position:relative;overflow:hidden;
}
.btn-login::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
    opacity:0;transition:opacity .3s;
}
.btn-login:hover::before{opacity:1}
.btn-login:hover{box-shadow:0 10px 36px rgba(201,168,76,0.4);transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}
.btn-login i{margin-right:8px}

/* ── FORGOT ── */
.forgot-link{
    display:block;text-align:center;margin-top:20px;
    font-size:.72rem;color:var(--muted);text-decoration:none;
    transition:color .2s;letter-spacing:.05em;
}
.forgot-link:hover{color:var(--g2)}
.forgot-link span{color:var(--g1);margin-left:4px}

/* ── FOOTER ── */
.login-footer{
    text-align:center;margin-top:28px;
    font-size:.58rem;letter-spacing:.12em;color:var(--dim);
    text-transform:uppercase;
}
.login-footer a{color:var(--g3);text-decoration:none}

/* ── LOADING STATE ── */
.btn-login.loading{pointer-events:none;opacity:.8}
.btn-login .btn-text{transition:opacity .2s}
.btn-login .spinner{display:none;width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
.btn-login.loading .btn-text{opacity:0.6}
.btn-login.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
</div>

<div class="gold-light" id="goldLight"></div>

<!-- THEME TOGGLE -->
<div class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
    <button class="toggle-btn" id="btnDark"><i class="fas fa-moon"></i></button>
    <span class="toggle-label" id="toggleLabel">Dark</span>
    <button class="toggle-btn" id="btnLight"><i class="fas fa-sun"></i></button>
</div>

<div class="login-wrap">
    <div class="login-card">

        <div class="login-logo">
            <div class="logo-gem"><i class="fas fa-gem"></i></div>
            <h1>Tara Adore</h1>
            <p>Jewellery Analytics Platform</p>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <span>Admin Access</span>
            <div class="divider-line"></div>
        </div>

        {% if error %}
        <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" onsubmit="handleLogin(this)">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" id="passInput" class="form-control" placeholder="Enter password" required autocomplete="current-password">
                    <button type="button" class="pass-toggle" onclick="togglePass()" id="passEye">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span class="spinner"></span>
                <i class="fas fa-lock btn-text" style="margin-right:8px"></i>
                <span class="btn-text">Access Dashboard</span>
            </button>
        </form>

        <a href="/forgot-password" class="forgot-link">
            Forgot your password?<span>Reset here </span>
        </a>
        <a href="/register" class="forgot-link">New admin?<span>Create account </span></a>

        <div class="login-footer">
            Secured with 256-bit encryption &nbsp;·&nbsp;
            <a href="#">taraadore.in</a>
        </div>
    </div>
</div>

<script>
// ── THEME TOGGLE ──
const html = document.documentElement;
const btnDark  = document.getElementById('btnDark');
const btnLight = document.getElementById('btnLight');
const goldLight = document.getElementById('goldLight');
const label = document.getElementById('toggleLabel');

let theme = localStorage.getItem('ta_theme') || 'dark';
applyTheme(theme);

function applyTheme(t){
    theme = t;
    html.setAttribute('data-theme', t);
    localStorage.setItem('ta_theme', t);
    if(t === 'dark'){
        btnDark.classList.add('active');
        btnLight.classList.remove('active');
        label.textContent = 'Dark';
    } else {
        btnLight.classList.add('active');
        btnDark.classList.remove('active');
        label.textContent = 'Light';
    }
}

function toggleTheme(){
    applyTheme(theme === 'dark' ? 'light' : 'dark');
}

// ── GOLD LIGHT TOGGLE (separate ambient orb effect) ──
let goldOn = false;
document.addEventListener('keydown', e => {
    if(e.key === 'g' || e.key === 'G'){
        goldOn = !goldOn;
        goldLight.classList.toggle('on', goldOn);
    }
});
// Long press on logo gem also toggles gold light
document.querySelector('.logo-gem').addEventListener('click', () => {
    goldOn = !goldOn;
    goldLight.classList.toggle('on', goldOn);
});

// ── PASSWORD TOGGLE ──
function togglePass(){
    const inp = document.getElementById('passInput');
    const icon = document.getElementById('eyeIcon');
    if(inp.type === 'password'){
        inp.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        inp.type = 'password';
        icon.className = 'fas fa-eye';
    }
}

// ── LOADING STATE ──
function handleLogin(form){
    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
}
</script>
</body>
</html>
